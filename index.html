<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Metrics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #videoContainer { position: relative; width: 100%; height: auto; overflow: hidden; }
        video { width: 100%; height: auto; }
        #controls { margin-top: 10px; }
        #status { margin-top: 10px; color: green; }
    </style>
</head>
<body>
    <h1>Camera Feed</h1>
    <div id="videoContainer">
        <video id="cameraFeed" muted playsinline>
            <source src="camera-feed-url.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div id="controls">
        <button id="startButton">Start</button>
        <button id="stopButton">Stop</button>
    </div>
    <div id="status">Status: Idle</div>
    <script>
        const video = document.getElementById('cameraFeed');
        const statusIndicator = document.getElementById('status');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');

        startButton.addEventListener('click', () => {
            console.log('Starting video feed...');
            video.play();
            statusIndicator.textContent = 'Status: Playing';
        });

        stopButton.addEventListener('click', () => {
            console.log('Stopping video feed...');
            video.pause();
            video.currentTime = 0;
            statusIndicator.textContent = 'Status: Stopped';
        });
    </script>
</body>
</html>
