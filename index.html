<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Metrics</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        video {
            width: 80%;
            height: auto;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <video id="videoElem" autoplay playsinline></video>
    <script>
        console.log('Initializing video element...');
        const video = document.getElementById('videoElem');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                console.log('Camera feed is displaying correctly.');
            })
            .catch(error => {
                console.error('Error accessing camera: ', error);
            });
    </script>
</body>
</html>
